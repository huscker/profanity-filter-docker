version: "3.7"

services:
  postgresql:
    image: postgres:15.6
    hostname: postgresql
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - 5432
    environment:
      - POSTGRES_DB=${POSTGRES_DATABASE}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - web
  redis:
    image: redis:6.2.4
    hostname: redis
    expose:
      - 6379
    environment:
      - POSTGRES_DB=${POSTGRES_DATABASE}
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - web
  api:
    image: "huscker/profanity-filter-docker:latest"
    ports:
      - "8000:8000"
    command: |
      poetry run uvicorn api.__main__:app --host 0.0.0.0 --port 8000 --log-level info
    depends_on:
      - redis
      - postgresql
    environment:
      - POSTGRES_HOST=postgresql
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DATABASE=${POSTGRES_DATABASE}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_USER=${REDIS_USER}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    restart: always
    networks:
      - web
networks:
  web:
volumes:
  postgres_data:
