name: Main Workflow

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
    - name: Build the Docker image
      run: docker build . -t huscker/profanity-filter-docker:latest
    - name: Push newly built docker image
      run: docker push huscker/profanity-filter-docker:latest

  deploy:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v3
      - name: Install helm secrets plugin
        run: helm plugin install https://github.com/jkroepke/helm-secrets --version v4.4.2
      - name: Install sops
        run: |-
          curl -O -L -C - https://github.com/mozilla/sops/releases/download/v3.7.3/sops-v3.7.3.linux
          sudo mv sops-v3.7.3.linux /usr/bin/sops
          sudo chmod +x /usr/bin/sops
      - name: Add private key
        run: echo "${{ secrets.GPG_KEY }}" | base64 -d | gpg --import
      - name: Create kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" > kubeconfig
      - name: Upgrade helm chart
        run: helm secrets upgrade
          --kubeconfig=kubeconfig
          --install 
          --atomic
          --timeout 5m0s
          --create-namespace 
          --namespace=feedback-analyzer 
          --values=.helm/secrets.yaml 
          --set "backend.image.tag=$(git rev-parse --short "$GITHUB_SHA")" 
          feedback-analyzer
          .helm
